type: http
name: Notify downstream consumers of a stock transfer invoice
url: '{{baseUrl}}/stock-transfer-orders/notifications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "invoiceNumber": "string",
      "counterNumber": 600,
      "customerInfo": {
        "customerNumber": 90001234,
        "customerName": "string",
        "customerAddress1": "string",
        "customerCity": "string",
        "customerState": "string",
        "customerZipCode": "string",
        "customerPhone": "string",
        "customerType": "string"
      },
      "delivery": false,
      "items": [
        {
          "line": "string",
          "item": "str",
          "quantity": 6320
        },
        {
          "line": "string",
          "item": "string",
          "quantity": 8189
        }
      ],
      "invoiceTotal": 1063.919943566345,
      "createdAt": "1991-08-14T22:59:24.823Z",
      "sourceSystem": "electronicordering",
      "legacyId": "string",
      "enactorId": "string"
    }
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "status": "accepted",
            "receivedAt": "2026-04-10T12:00:00.000Z",
            "invoiceNumber": "INV-1001"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Notification accepted
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "correlationId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Request payload failed API boundary validation.
