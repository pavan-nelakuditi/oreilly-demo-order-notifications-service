type: http
name: Notify downstream consumers of a stock transfer invoice
url: '{{baseUrl}}/stock-transfer-orders/notifications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "invoiceNumber": "string",
      "counterNumber": 1509,
      "customerInfo": {
        "customerNumber": 90001234,
        "customerName": "string",
        "customerAddress1": "string",
        "customerCity": "string",
        "customerState": "string",
        "customerZipCode": "string",
        "customerPhone": "string",
        "customerType": "string"
      },
      "delivery": true,
      "items": [
        {
          "line": "string",
          "item": "string",
          "quantity": 4983
        },
        {
          "line": "string",
          "item": "string",
          "quantity": 449
        }
      ],
      "invoiceTotal": 7369.863366995865,
      "createdAt": "2000-09-27T09:38:10.161Z",
      "sourceSystem": "electronicordering",
      "legacyId": "string",
      "enactorId": "string"
    }
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "status": "accepted",
            "receivedAt": "2026-04-10T12:00:00.000Z",
            "invoiceNumber": "INV-1001"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Notification accepted
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "correlationId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Request payload failed API boundary validation.
