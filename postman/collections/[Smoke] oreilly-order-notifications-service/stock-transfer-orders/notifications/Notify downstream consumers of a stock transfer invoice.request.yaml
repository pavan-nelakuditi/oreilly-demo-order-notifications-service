type: http
name: Notify downstream consumers of a stock transfer invoice
url: '{{baseUrl}}/stock-transfer-orders/notifications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "invoiceNumber": "string",
      "counterNumber": 5631,
      "customerInfo": {
        "customerNumber": 90001234,
        "customerName": "string",
        "customerAddress1": "string",
        "customerCity": "string",
        "customerState": "string",
        "customerZipCode": "string",
        "customerPhone": "string",
        "customerType": "string"
      },
      "delivery": true,
      "items": [
        {
          "line": "string",
          "item": "string",
          "quantity": 9743
        },
        {
          "line": "string",
          "item": "string",
          "quantity": 9243
        }
      ],
      "invoiceTotal": 3723.972504811088,
      "createdAt": "2005-04-24T21:11:26.742Z",
      "sourceSystem": "remote-pos",
      "legacyId": "string",
      "enactorId": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "status": "accepted",
            "receivedAt": "2026-04-10T12:00:00.000Z",
            "invoiceNumber": "INV-1001"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Notification accepted
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "correlationId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Request payload failed API boundary validation.
